<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="$lang$" xml:lang="$lang$"$if(dir)$ dir="$dir$"$endif$>
<head>
  <meta charset="utf-8" />
  <meta name="generator" content="pandoc" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
$for(author-meta)$
  <meta name="author" content="$author-meta$" />
$endfor$
$if(date-meta)$
  <meta name="dcterms.date" content="$date-meta$" />
$endif$
$if(keywords)$
  <meta name="keywords" content="$for(keywords)$    $keywords$$sep$, $endfor$" />
$endif$
  <base href="$base$">
$if(description-meta)$
  <meta name="description" content="$description-meta$" />
$endif$
<title>$pagetitle$ &#183 $title$</title>
<style>
* {
    font-family: Georgia, 'Times New Roman', Times, serif;
    font-size: 16px;
}

nav, .breadcrumbs, section, footer {
    width: min(90%, 600px);
    margin: auto;
}

p {
    line-height: 150%;
}

pre {
    font-family: 'Consolas', 'Courier New', Courier, monospace;
}

footer {
    display: flex;
    justify-content: space-between;
    margin-bottom: 150px;
}

footer .prev::before {
    content: '← ';
}

footer .next::after {
    content: '→';
}

</style>
</head>
<body>

<nav>
    $table-of-contents$
</nav>

<div class="breadcrumbs">
    <a href="">~</a>
</div>

$body$

<footer>
    $if(previous.url)$
    <a class="prev" href="$previous.url$" accesskey="p">
        $previous.title$
    </a>
    $endif$
    $if(next.url)$
    <a class="next" href="$next.url$" accesskey="n">
        $next.title$
    </a>
    $endif$
</footer>

</body>
</html>
